<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstantBrief — Enterprise Document Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-dark: #0F6E56;
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --border: #E8E8E4;
    --text: #1A1A18;
    --text-muted: #6B6B67;
    --text-hint: #A8A8A4;
    --sidebar-w: 260px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--teal);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 16px; height: 16px; }

  .logo-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 400;
  }

  .upload-btn {
    margin: 14px 14px 10px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }

  .upload-btn:hover { background: var(--teal-dark); }

  .upload-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  #fileInput { display: none; }

  .docs-label {
    padding: 0 16px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    color: var(--text-hint);
    text-transform: uppercase;
  }

  #docList {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
  }

  .doc-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .doc-item:hover { background: var(--bg); }
  .doc-item.active { background: var(--teal-light); }

  .doc-icon {
    width: 28px;
    height: 28px;
    background: var(--bg);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .doc-item.active .doc-icon { background: white; }

  .doc-icon svg { width: 14px; height: 14px; color: var(--teal); }

  .doc-name {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .doc-pages {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  .api-key-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .api-key-row label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.6px;
    color: var(--text-hint);
    text-transform: uppercase;
    white-space: nowrap;
  }

  #apiKeyInput {
    flex: 1;
    font-family: var(--mono);
    font-size: 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }

  #apiKeyInput:focus { border-color: var(--teal); }

  /* MAIN */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
  }

  #docTitle {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  #docBadge {
    font-size: 11px;
    background: var(--teal-light);
    color: var(--teal-dark);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    display: none;
  }

  /* EMPTY STATE */
  #emptyState {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    background: var(--teal-light);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-icon svg { width: 28px; height: 28px; color: var(--teal); }

  #emptyState h2 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  #emptyState p {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    max-width: 280px;
    line-height: 1.5;
  }

  /* CHAT */
  #chatArea {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 80%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--teal-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    color: var(--teal-dark);
  }

  .msg.user .msg-avatar { background: var(--text); color: white; }

  .msg-body { display: flex; flex-direction: column; gap: 4px; }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.6;
  }

  .msg.user .msg-bubble {
    background: var(--text);
    color: white;
    border-bottom-right-radius: 3px;
  }

  .msg.ai .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
    color: var(--text);
  }

  .source-badge {
    font-size: 11px;
    font-family: var(--mono);
    background: var(--teal-light);
    color: var(--teal-dark);
    padding: 4px 10px;
    border-radius: 5px;
    align-self: flex-start;
    border: 1px solid #9FE1CB;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
  }

  .dot {
    width: 6px; height: 6px;
    background: var(--text-hint);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* INPUT */
  #inputArea {
    padding: 14px 24px 18px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: none;
  }

  #inputRow {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    transition: border-color 0.15s;
  }

  #inputRow:focus-within { border-color: var(--teal); }

  #questionInput {
    flex: 1;
    border: none;
    background: transparent;
    font-family: var(--font);
    font-size: 13.5px;
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 20px;
    max-height: 100px;
    line-height: 1.5;
  }

  #questionInput::placeholder { color: var(--text-hint); }

  #sendBtn {
    width: 32px;
    height: 32px;
    background: var(--teal);
    border: none;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  #sendBtn:hover { background: var(--teal-dark); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { background: var(--border); cursor: not-allowed; }
  #sendBtn svg { width: 15px; height: 15px; color: white; }

  .hint {
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 6px;
    text-align: center;
  }

  /* LOADING OVERLAY */
  #loadingOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(247,247,245,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }

  #loadingOverlay.show { display: flex; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loadingText { font-size: 13px; color: var(--text-muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 4h10M3 8h7M3 12h5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-name">InstantBrief</div>
        <div class="logo-sub">Document Intelligence</div>
      </div>
    </div>
  </div>

  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M7.5 1v9M4 5l3.5-4L11 5M2 11h11v3H2v-3z" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Upload Document
  </button>
  <input type="file" id="fileInput" accept=".pdf,.txt" multiple>

  <div class="docs-label">Documents</div>
  <div id="docList"></div>

  <div class="sidebar-footer">
    <div class="api-key-row">
      <label>API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <span id="docTitle" style="color: var(--text-muted); font-size:13px;">No document selected</span>
    <span id="docBadge"></span>
  </div>

  <div id="emptyState">
    <div class="empty-icon">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 4h10l6 6v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M16 4v6h6M9 14h10M9 18h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <h2>Upload a document to begin</h2>
    <p>InstantBrief reads your PDFs and answers questions with cited references from the source.</p>
  </div>

  <div id="chatArea"></div>

  <div id="inputArea">
    <div id="inputRow">
      <textarea id="questionInput" placeholder="Ask anything about this document..." rows="1"></textarea>
      <button id="sendBtn" onclick="sendQuestion()">
        <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7.5 2v11M3 6l4.5-4L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">Reading document...</div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let docs = {};
  let activeDocId = null;
  let chatHistory = {};
  let isLoading = false;

  // FILE UPLOAD
  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    for (const file of files) await loadFile(file);
    e.target.value = '';
  });

  async function loadFile(file) {
    showLoading('Reading ' + file.name + '...');
    const id = Date.now() + Math.random();
    try {
      let text = '';
      let pages = 1;
      if (file.name.endsWith('.pdf')) {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        pages = pdf.numPages;
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(s => s.str).join(' ') + '\n';
        }
      } else {
        text = await file.text();
      }
      docs[id] = { name: file.name, text, pages };
      chatHistory[id] = [];
      renderDocList();
      setActiveDoc(id);
    } catch(err) {
      alert('Could not read file: ' + err.message);
    }
    hideLoading();
  }

  function renderDocList() {
    const list = document.getElementById('docList');
    list.innerHTML = '';
    Object.entries(docs).forEach(([id, doc]) => {
      const item = document.createElement('div');
      item.className = 'doc-item' + (id == activeDocId ? ' active' : '');
      item.onclick = () => setActiveDoc(id);
      item.innerHTML = `
        <div class="doc-icon">
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 2h6l3 3v7a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2"/>
            <path d="M9 2v3h3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="doc-name">${doc.name}</div>
          <div class="doc-pages">${doc.pages} page${doc.pages > 1 ? 's' : ''}</div>
        </div>
      `;
      list.appendChild(item);
    });
  }

  function setActiveDoc(id) {
    activeDocId = id;
    renderDocList();
    const doc = docs[id];
    document.getElementById('docTitle').textContent = doc.name;
    document.getElementById('docTitle').style.color = 'var(--text)';
    const badge = document.getElementById('docBadge');
    badge.textContent = doc.pages + ' pages';
    badge.style.display = 'inline-block';
    document.getElementById('emptyState').style.display = 'none';
    const chatArea = document.getElementById('chatArea');
    chatArea.style.display = 'flex';
    document.getElementById('inputArea').style.display = 'block';
    renderChat(id);
  }

  function renderChat(id) {
    const chatArea = document.getElementById('chatArea');
    chatArea.innerHTML = '';
    (chatHistory[id] || []).forEach(msg => appendBubble(msg.role, msg.content, msg.source));
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function appendBubble(role, content, source) {
    const chatArea = document.getElementById('chatArea');
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const initials = role === 'user' ? 'You' : 'IB';
    wrap.innerHTML = `
      <div class="msg-avatar">${initials}</div>
      <div class="msg-body">
        <div class="msg-bubble">${content.replace(/\n/g, '<br>')}</div>
        ${source ? `<div class="source-badge">📎 ${source}</div>` : ''}
      </div>
    `;
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
    return wrap;
  }

  function appendTyping() {
    const chatArea = document.getElementById('chatArea');
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typingIndicator';
    wrap.innerHTML = `
      <div class="msg-avatar">IB</div>
      <div class="msg-body">
        <div class="msg-bubble">
          <div class="typing-indicator">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
        </div>
      </div>
    `;
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  async function sendQuestion() {
    if (isLoading || !activeDocId) return;
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;

    const apiKey = document.getElementById('apiKeyInput').value.trim();
    if (!apiKey) {
      alert('Please enter your Anthropic API key in the sidebar.');
      return;
    }

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    chatHistory[activeDocId].push({ role: 'user', content: question });
    appendBubble('user', question);
    appendTyping();

    const doc = docs[activeDocId];
    const contextText = doc.text.slice(0, 80000);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 1024,
          system: `You are InstantBrief, an enterprise document analyst. Answer questions strictly based on the provided document content. Be concise and precise. At the end of every answer, add a line starting with "SOURCE:" followed by a short exact quote (under 15 words) from the document that supports your answer. Document content:\n\n${contextText}`,
          messages: [{ role: 'user', content: question }]
        })
      });

      const data = await res.json();
      document.getElementById('typingIndicator')?.remove();

      if (data.error) throw new Error(data.error.message);

      const fullText = data.content[0].text;
      let answer = fullText;
      let source = null;

      const sourceMatch = fullText.match(/SOURCE:\s*(.+)/i);
      if (sourceMatch) {
        source = sourceMatch[1].trim();
        answer = fullText.replace(/SOURCE:\s*.+/i, '').trim();
      }

      chatHistory[activeDocId].push({ role: 'ai', content: answer, source });
      appendBubble('ai', answer, source);

    } catch (err) {
      document.getElementById('typingIndicator')?.remove();
      appendBubble('ai', '⚠️ Error: ' + err.message);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  // Enter to send
  document.getElementById('questionInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  // Auto-resize textarea
  document.getElementById('questionInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  function showLoading(text) {
    document.getElementById('loadingText').textContent = text || 'Loading...';
    document.getElementById('loadingOverlay').classList.add('show');
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('show');
  }
</script>
</body>
</html>
